<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Claude logo mark: stylized overlapping petal/arc shapes -->
  <g transform="translate(4, 4)">
    <!-- Outer petals forming the Claude mark -->
    <ellipse cx="16" cy="16" rx="5.5" ry="11" transform="rotate(-40 16 16)" fill="#1a1a1a" opacity="0.9"/>
    <ellipse cx="16" cy="16" rx="5.5" ry="11" transform="rotate(0 16 16)"   fill="#1a1a1a" opacity="0.7"/>
    <ellipse cx="16" cy="16" rx="5.5" ry="11" transform="rotate(40 16 16)"  fill="#1a1a1a" opacity="0.5"/>
    <!-- Center cap -->
    <circle cx="16" cy="16" r="4" fill="#1a1a1a"/>
  </g>
  <!-- Wordmark -->
  <text x="42" y="26" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a" letter-spacing="-0.3">Claude</text>
</svg>
